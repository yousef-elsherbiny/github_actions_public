name: Multi environment test

on:
    workflow_dispatch

jobs:
    job_1:
        strategy:
            fail-fast: false # By default it's true
                             # false means if job fails, continue execute the other jobs
                             # We follow this strategy because other jobs execute the same tests but in other environments
                             # Other environments like linux, windows, mac
            max-parallel: 3 # The max number of parellel executed jobs
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                node_version: [14.x, 15.x, 16.x]
        runs-on: ${{ matrix.os }}
        steps:
        - uses: actions/setup-node@v3.6.0
          with:
            node-version: ${{ matrix.node_version }}
